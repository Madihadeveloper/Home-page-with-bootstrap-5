<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Homepage</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column vh-100">

    <!-- Top Right Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid justify-content-end gap-3">
            <a class="nav-link text-dark" href="#">Gmail</a>
            <a class="nav-link text-dark" href="#">Images</a>
            <div class="fs-4">☰</div>
            <div class="bg-primary rounded-circle" style="width:35px; height:35px;"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container text-center flex-grow-1 d-flex flex-column justify-content-center align-items-center">

        <!-- Logo -->
        <h1 class="display-1 fw-normal mb-4">
            <span class="text-primary">G</span>
            <span class="text-danger">o</span>
            <span class="text-warning">o</span>
            <span class="text-primary">g</span>
            <span class="text-success">l</span>
            <span class="text-danger">e</span>
        </h1>

        <!-- Search Box -->
        <div class="col-lg-6 col-md-8 col-11">
            <input type="text" class="form-control rounded-pill p-3 shadow-sm"
                   placeholder="Search Google or type a URL">
        </div>

        <!-- Buttons -->
        <div class="mt-4">
            <button class="btn btn-light me-2">Google Search</button>
            <button class="btn btn-light">I'm Feeling Lucky</button>
        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-light py-3">
        <div class="container d-flex justify-content-between flex-wrap">
            <div>
                <a href="#" class="text-decoration-none text-muted me-3">Advertising</a>
                <a href="#" class="text-decoration-none text-muted me-3">Business</a>
                <a href="#" class="text-decoration-none text-muted">About</a>
            </div>
            <div>
                <a href="#" class="text-decoration-none text-muted me-3">Privacy</a>
                <a href="#" class="text-decoration-none text-muted me-3">Terms</a>
                <a href="#" class="text-decoration-none text-muted">Settings</a>
            </div>
        </div>
    </footer>

</body>
</html>
